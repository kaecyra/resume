cover_letter:
  greeting: "Dear Hiring Team,"
  body: |
    I'm writing about the CTO role at XWP. You need someone who can set enterprise technical standards, lead an AI transformation, serve as the technical authority in client engagements, and mentor engineering leadership — all within an open-source-rooted, fully remote organization. That's the work I've been doing for over a decade, and I'd like to explain why I think the fit is strong.

    At .Monks, I lead a 300-person engineering org distributed across NA, LATAM, and EMEA. When I stepped in, the org was destabilized following my predecessor's exit with 30+ concurrent projects at risk. I stabilized through radical transparency and data-driven resource management, maintaining 90%+ retention of critical talent. Then I went on offense: I architected LiveVision, an AI-powered real-time video processing platform, by putting underutilized bench resources to work and securing non-traditional Capex funding. I validated it through a live demo at CES 2026 and an invited presentation at NVIDIA GTC 2026. That's what AI strategy looks like when a CTO actually builds things instead of commissioning slide decks.

    The role calls for someone who can define service offerings, contribute to solutioning and estimation, and serve as the technical authority in sales engagements. I stood up a pre-sales SME program that gave the sales team direct access to deep technical authority, compressing sales cycles and landing high-complexity Enterprise deals. I've also productized repeatable technical assets from within a services P&L — turning internal capability into defensible revenue streams rather than treating every engagement as a bespoke build.

    My open-source roots run deep — and they share DNA with WordPress. I was the first employee at Vanilla Forums, an open-source PHP platform with the same architectural bones: plugin/extension ecosystems, theme layers, multi-tenant hosting at scale, and a global community of contributors who care deeply about the open web. I spent nearly a decade scaling Vanilla from zero to $10M ARR through a profitable acquisition. I built the multi-tenant SaaS architecture, the Infosec program (SOC2 from scratch), and scaled infrastructure across four data centers with a private-cloud-first strategy. Post-acquisition at Higher Logic, I led the modernization of five global platforms, transitioning legacy stacks to automated deployment pipelines and de-risking single-point-of-failure architectures. The enterprise challenges — performance at scale, security compliance, plugin architecture governance, reliable multi-tenant hosting — are the same problems, on the same foundation.

    I'd welcome the conversation about how that experience translates to what XWP is building.
  closing: "Best regards,"

