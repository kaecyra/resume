cover_letter:
  greeting: "Dear CoLab Hiring Team,"
  body: |
    I'm writing about the VP of Software Engineering role. You need someone who can scale a high-performing engineering organization through Series A-C growth, partner with Product on roadmap execution, manage operating metrics with discipline, maintain SOC2/ISO compliance maturity, and bring AI strategy from concept to production. That's the trajectory of my career, and the fit is direct enough that I want to walk you through it.

    At Vanilla Forums, I was the first employee after the founders. Over nearly a decade I built the entire SaaS engineering organization from scratch — the multi-tenant cloud architecture, the provisioning and monitoring systems, and the teams that operated them. I scaled the company from $0 to $10M ARR through a profitable acquisition by Higher Logic. That journey required building everything CoLab is building now: the engineering team, the leadership layers, the compliance programs, and the operational infrastructure that lets you ship fast without breaking things. I built our Infosec organization from zero and achieved SOC2 compliance, which transformed security from a cost center into a competitive advantage that unlocked Fortune 500 enterprise deals. I know what compliance maturity looks like at every stage of growth because I've constructed it from scratch.

    At .Monks, I lead a 300-person engineering org distributed across three continents, managing through directors and senior managers across 30+ concurrent engagements. I built a data-driven staffing and margin system that tracks the operating metrics that matter — utilization, delivery risk, budget alignment — and replaced ad-hoc processes with automated, finance-ready reporting. I also stood up a pre-sales SME program that embedded senior engineers directly into the sales cycle, compressing deal timelines and supporting customer success through technical authority. That's the same "support customer success and technical sales" muscle your posting describes.

    On AI: I architected LiveVision, an AI-powered real-time video processing platform, from concept through commercial validation — securing capital investment for GPU infrastructure, demonstrating viability at CES 2026, and presenting the architecture at NVIDIA GTC 2026. I understand what it takes to move AI from proof-of-concept to production at scale, and I've done it while running a large engineering organization simultaneously. The player-coach model isn't aspirational for me.

    Post-acquisition at Higher Logic, I led the modernization of five global platforms — transitioning legacy stacks to automated deployment pipelines and de-risking single-point-of-failure architectures. I've lived the "inherited technical debt during rapid growth" problem and know how to manage it without grinding feature delivery to a halt.

    I'm drawn to CoLab's problem space and the stage you're at. Scaling an engineering org through this growth phase while maintaining compliance rigor and shipping AI capabilities is exactly the challenge I've built my career around. I'd welcome the conversation.
  closing: "Best regards,"

