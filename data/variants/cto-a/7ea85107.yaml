title: "Vice President of Engineering"

summary: |
  Engineering executive who has scaled SaaS organizations through every growth phase — from
  first engineer through profitable acquisition at $10M ARR. Built compliance programs (SOC2
  from scratch), multi-tenant cloud architecture, and AI-native product capabilities while
  managing operating metrics across uptime, velocity, quality, and cost. Leads through managers
  across globally distributed teams with a low-ego, high-transparency approach that retains
  senior talent through volatility.

tagline: |
  **I build the engineering organizations required to scale without the bullshit.**

