title: "Chief Technology Officer"

summary: |
    Technology leader and systems-thinking CTO with deep experience scaling
    engineering organizations through VC-backed growth phases. Led engineering
    teams of 300+ across three continents, built a SaaS platform from first
    commit through profitable acquisition ($0 to $10M ARR), and delivered
    AI-native product capabilities from concept through commercial validation.

    Hands-on technical leader who stays close to architecture while building
    the distributed teams, operational frameworks, and engineering culture
    required to sustain rapid scaling across time zones and geographies.

cover_letter:
  greeting: "Dear Overstory Hiring Team,"
  body: |
    I am writing regarding the Chief Technology Officer role. Overstory is looking for a technical leader who can scale the engineering organization through its next growth phase following Series B — someone who balances hands-on technical depth with the organizational leadership required to build high-performing remote teams across time zones, and who can articulate a compelling 12-36 month technical vision. That trajectory is one I have navigated directly.

    At Vanilla Forums, I was the first employee after the founders. Over nearly a decade, I grew from an individual contributor into the Chief Operating Officer, building the engineering, infrastructure, information security, and customer experience organizations from scratch. I designed and built the multi-tenant SaaS platform architecture, hired and developed the engineering teams that operated it, achieved SOC2 compliance, and scaled infrastructure across four data centers spanning North America and the EU. That journey took us from zero to $10M ARR and through a profitable acquisition by Higher Logic — requiring the construction of leadership layers, compliance programs, and the cultural systems that hold a distributed team together through rapid growth.

    At .Monks, I lead a 300-person engineering organization distributed across North America, Latin America, and EMEA, managing through directors and senior managers. I architected LiveVision, an AI-powered real-time video processing platform, hands-on — designing the inference pipeline and edge-broadcast architecture — then validated it through a live demonstration at CES 2026 and an invited presentation at NVIDIA GTC 2026. In parallel, I built the data-driven operational systems that replaced ad-hoc processes with measurable delivery and capacity frameworks across 30+ concurrent engagements. I maintained 90%+ retention of critical senior talent across three continents during a period of significant organizational change.

    On distributed team leadership: I have built and led remote-first engineering cultures spanning multiple continents and time zones for over a decade. I designed asynchronous communication norms, timezone-equitable meeting practices, and documentation-driven decision processes that create cohesion without demanding cultural conformity.

    I would welcome the opportunity to discuss how this experience applies to Overstory's mission and growth trajectory.
  closing: "Best regards,"

